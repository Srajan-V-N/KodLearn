<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Grid lines -->
  <line x1="0" y1="112" x2="800" y2="112" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="0" y1="337" x2="800" y2="337" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="450" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="450" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="450" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
  <!-- Glow circles -->
  <circle cx="650" cy="80" r="120" fill="rgba(59,130,246,0.12)"/>
  <circle cx="150" cy="370" r="90" fill="rgba(96,165,250,0.08)"/>
  <!-- Code brackets  </> -->
  <!-- Left bracket < -->
  <text x="200" y="270" font-family="'Courier New',monospace" font-size="160" font-weight="900" fill="url(#accent)" text-anchor="middle" opacity="0.9">&lt;</text>
  <!-- Slash / -->
  <text x="400" y="270" font-family="'Courier New',monospace" font-size="160" font-weight="900" fill="white" text-anchor="middle" opacity="0.75">/</text>
  <!-- Right bracket > -->
  <text x="600" y="270" font-family="'Courier New',monospace" font-size="160" font-weight="900" fill="url(#accent)" text-anchor="middle" opacity="0.9">&gt;</text>
  <!-- Label -->
  <text x="400" y="380" font-family="system-ui,sans-serif" font-size="22" font-weight="600" fill="rgba(255,255,255,0.5)" text-anchor="middle" letter-spacing="4">PROGRAMMING</text>
  <!-- Bottom accent bar -->
  <rect x="340" y="398" width="120" height="3" rx="2" fill="url(#accent)" opacity="0.7"/>
</svg>
