<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0d00"/>
      <stop offset="100%" stop-color="#3d1f00"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="orange2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <circle cx="400" cy="210" r="200" fill="rgba(234,88,12,0.1)"/>
  <!-- Infinity loop (∞) using two circles' arcs -->
  <!-- Left loop -->
  <circle cx="310" cy="210" r="95" fill="none" stroke="url(#orange)" stroke-width="18" stroke-dasharray="298 298" stroke-dashoffset="149" stroke-linecap="round"/>
  <!-- Right loop -->
  <circle cx="490" cy="210" r="95" fill="none" stroke="url(#orange2)" stroke-width="18" stroke-dasharray="298 298" stroke-dashoffset="-149" stroke-linecap="round"/>
  <!-- Gear teeth around infinity - left gear overlay -->
  <g opacity="0.4">
    <circle cx="310" cy="210" r="115" fill="none" stroke="rgba(251,146,60,0.3)" stroke-width="2" stroke-dasharray="6,10"/>
  </g>
  <g opacity="0.4">
    <circle cx="490" cy="210" r="115" fill="none" stroke="rgba(251,146,60,0.3)" stroke-width="2" stroke-dasharray="6,10"/>
  </g>
  <!-- Dev label (left) -->
  <text x="310" y="215" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="rgba(255,255,255,0.85)" text-anchor="middle">DEV</text>
  <!-- Ops label (right) -->
  <text x="490" y="215" font-family="system-ui,sans-serif" font-size="28" font-weight="800" fill="rgba(255,255,255,0.85)" text-anchor="middle">OPS</text>
  <!-- Small gear icons on the crossing points -->
  <!-- Left crossing dot -->
  <circle cx="400" cy="180" r="12" fill="url(#orange)" opacity="0.9"/>
  <circle cx="400" cy="240" r="12" fill="url(#orange2)" opacity="0.9"/>
  <!-- CI/CD pipeline arrows below -->
  <g transform="translate(0, 20)">
    <rect x="155" y="335" width="80" height="24" rx="12" fill="rgba(251,146,60,0.2)" stroke="rgba(251,146,60,0.4)" stroke-width="1"/>
    <text x="195" y="351" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Build</text>
    <line x1="235" y1="347" x2="265" y2="347" stroke="rgba(251,146,60,0.5)" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="265" y="335" width="80" height="24" rx="12" fill="rgba(251,146,60,0.2)" stroke="rgba(251,146,60,0.4)" stroke-width="1"/>
    <text x="305" y="351" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Test</text>
    <line x1="345" y1="347" x2="375" y2="347" stroke="rgba(251,146,60,0.5)" stroke-width="2"/>
    <rect x="375" y="335" width="80" height="24" rx="12" fill="rgba(251,146,60,0.2)" stroke="rgba(251,146,60,0.4)" stroke-width="1"/>
    <text x="415" y="351" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Deploy</text>
    <line x1="455" y1="347" x2="485" y2="347" stroke="rgba(251,146,60,0.5)" stroke-width="2"/>
    <rect x="485" y="335" width="80" height="24" rx="12" fill="rgba(251,146,60,0.2)" stroke="rgba(251,146,60,0.4)" stroke-width="1"/>
    <text x="525" y="351" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.6)" text-anchor="middle">Monitor</text>
  </g>
  <!-- Label -->
  <text x="400" y="416" font-family="system-ui,sans-serif" font-size="20" font-weight="600" fill="rgba(255,255,255,0.45)" text-anchor="middle" letter-spacing="4">DEVOPS</text>
  <rect x="340" y="428" width="120" height="3" rx="2" fill="url(#orange)" opacity="0.8"/>
</svg>
